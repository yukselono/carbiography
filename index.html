        const getCarCultureData = (make, model, power, segment) => {
            const normalize = (str) => (str || '').toString().toLowerCase().replace(/[^a-z0-9]/g, '');
            const key = normalize(make) + normalize(model);
            let data = carCultureDB[key];

            if (!data) {
                const brandKey = normalize(make);
                const brandMatches = Object.keys(carCultureDB).filter(k => k.startsWith(brandKey));
                if (brandMatches.length > 0) {
                    data = { ...carCultureDB[brandMatches[0]], games: ['Various Generic Racing Games'], movies: ['Background Extra in Various Movies'], production: carCultureDB[brandMatches[0]].production * 1.5 };
                }
            }

            if (!data) {
                let estProduction = 5000000;
                let rarity = 'Common';
                let games = [];
                let movies = [];
                const hp = Number(power) || 100;
                const seg = String(segment).toLowerCase();

                if (hp > 500 || seg.includes('performance') || seg.includes('supercar')) {
                    estProduction = Math.floor(Math.random() * 8000) + 2000;
                    rarity = 'Ultra Rare';
                    games = ['Forza Horizon 5', 'Gran Turismo 7', 'Assetto Corsa'];
                    movies = ['Fast & Furious (Background)', 'James Bond (Cameo)'];
                } else if (hp > 300 || seg.includes('luxury') || seg.includes('sport')) {
                    estProduction = Math.floor(Math.random() * 150000) + 50000;
                    rarity = 'Rare';
                    games = ['Forza Motorsport', 'Need for Speed Unbound'];
                    movies = ['Action Movie Chase Scene'];
                } else if (hp > 200 || seg.includes('comfort')) {
                    estProduction = Math.floor(Math.random() * 800000) + 200000;
                    rarity = 'Uncommon';
                    games = ['City Car Driving Simulator'];
                    movies = ['Standard Background Vehicle'];
                } else {
                    games = ['Gran Turismo (Generic Class)'];
                }
                data = { production: estProduction, rarity, games, movies };
            }

            const globalPop = 8000000000;
            const percentile = ((data.production / globalPop) * 100).toFixed(5); 
            
            return {
                ...data,
                percentile,
                formattedProduction: data.production >= 1000000 ? (data.production / 1000000).toFixed(1) + 'M' : data.production.toLocaleString()
            };
        };

        // --- GEMINI API INTEGRATION (ROBUST ERROR HANDLING) ---
        const callGemini = async (prompt, systemPrompt = "You are an expert automotive critic and AI assistant.") => {
            const injectedKey = "AIzaSyBpNn8zotNo11CaO-Xv7Ypf8R5F7eaGMI8"; 
            let activeApiKey = injectedKey;

            if (!activeApiKey || activeApiKey === "") {
                activeApiKey = localStorage.getItem('carbio_gemini_key') || "";
                if (!activeApiKey || activeApiKey === "") {
                    const userInput = window.prompt("To use AI features, please enter your free Google Gemini API Key:\n(Get it from https://aistudio.google.com/app/apikey)");
                    if (userInput) {
                        activeApiKey = userInput.trim();
                        localStorage.setItem('carbio_gemini_key', activeApiKey);
                    } else {
                        throw new Error("API Key is required to use AI features.");
                    }
                }
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeApiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            const delays = [1000, 2000, 4000, 8000, 16000]; 
            
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    
                    if (!response.ok) {
                        if (data.error?.message?.includes("API key not valid") || data.error?.message?.includes("unregistered")) {
                            localStorage.removeItem('carbio_gemini_key');
                        }
                        throw new Error(data.error?.message || `API Error (${response.status})`);
                    }
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "The AI is currently unable to respond.";
                } catch (error) {
                    if (i === delays.length) {
                        throw new Error(`Failed to connect to the AI service. Error: ${error.message}`);
                    }
                    await new Promise(res => setTimeout(res, delays[i]));

        const calculateCO2 = (car) => {
            const distance = Number(car['Mileage (est)']) || 0;
            const hp = Number(car.Power) || 100;
            const fuel = String(car.Fuel).toLowerCase();
            let gPerKm = 120 + (hp * 0.4); 
            if (fuel.includes('electric')) gPerKm = 0;
            else if (fuel.includes('hybrid')) gPerKm = 80 + (hp * 0.2);
            else if (fuel.includes('diesel')) gPerKm = 100 + (hp * 0.3);
            return (gPerKm * distance) / 1000;
        };

            if(data.length === 0) return 0;
            const cars = data.length;
            const countries = new Set(data.map(c=>c.Country).filter(Boolean)).size;

            const totalDist = data.reduce((s,c)=>s+(Number(c['Mileage (est)'])||0),0);
            
            let score = (cars * 1.5) + (countries * 3) + (totalHp / 200) + (totalDist / 5000);
            return Math.min(Math.round(score), 99);

            const [carImage, setCarImage] = React.useState('');
            const [aiStory, setAiStory] = React.useState('');

                const normalize = (str) => (str || '').toString().toLowerCase().replace(/[^a-z0-9]/g, '');

                const isMatch = (c) => normalize(c.Make).includes(searchMake) && normalize(c.Model).includes(searchModel);

                if (!isNaN(searchYear)) {
                    match = existingData.find(c => isMatch(c) && parseInt(c['Model Year'] || String(c['Driving Year']).split('-')[0]) === searchYear);

                if (!match && !isNaN(searchYear)) {
                    match = localCarDB.find(c => isMatch(c) && c.MinYear <= searchYear && c.MaxYear >= searchYear);

                if (!match) {
                    match = existingData.find(isMatch) || localCarDB.find(isMatch);

                if (match) {

                                </h3>
                                <p className="text-gray-400 text-sm mt-3 max-w-xl leading-relaxed">
                                    The transition is accelerating. Here is the latest Q1 2026 global new car market share by powertrain type, reflecting the rapid adoption of electrified vehicles.
                                </p>
                            </div>
                        </div>

                        <div className="w-full h-12 bg-dark/60 p-1.5 rounded-2xl flex gap-1.5 mb-10 border border-white/5 shadow-inner backdrop-blur-md">
                            {stats.map(stat => (
                                <div 
                                    key={stat.id} 
                                    className={`h-full rounded-xl ${stat.color} relative group cursor-pointer transition-all duration-500 hover:brightness-125 ${stat.glow}`} 
                                    style={{ width: `${stat.percentage}%` }}
                                >
                                    <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm bg-black/20 rounded-xl">
                                        <span className="text-xs font-black text-white drop-shadow-md tracking-widest">{stat.label} {stat.percentage}%</span>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                            {stats.map(stat => (
                                <div key={stat.id} className={`bg-gradient-to-b ${stat.fromCol} to-card border ${stat.borderCol} rounded-3xl p-6 relative overflow-hidden group hover:-translate-y-2 transition-all duration-300 shadow-lg hover:shadow-[0_10px_30px_rgba(0,0,0,0.5)]`}>
                                    <div className="absolute -bottom-6 -right-4 text-8xl opacity-[0.03] group-hover:scale-110 group-hover:opacity-10 group-hover:-rotate-12 transition-all duration-500">{stat.icon}</div>
                                    
                                    <div className="flex flex-col h-full relative z-10">
                                        <div className="flex justify-between items-start mb-8">
                                            <div className={`w-14 h-14 rounded-2xl bg-dark/80 backdrop-blur-md ${stat.textCol} flex items-center justify-center text-3xl shadow-lg border border-white/5 group-hover:scale-110 transition-transform duration-300`}>
                                                {stat.icon}
                                            </div>
                                            <div className={`text-4xl font-display font-black ${stat.textCol} tracking-tighter drop-shadow-lg`}>
                                                {stat.percentage}<span className="text-xl opacity-70">%</span>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-white/5">
                                            <h4 className="text-white font-bold text-xl mb-1">{stat.label}</h4>
                                            <p className="text-sm text-gray-400 font-medium leading-snug">{stat.desc}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const EventsCalendar = () => {
            const [filter, setFilter] = React.useState('Top 10');

            const events = [
                { title: "WRC Safari Rally Kenya", date: "Mar 26 - 29, 2026", month: 3, type: "Motorsport", isTop10: true, location: "Naivasha, Kenya", price: "From $50" },
                { title: "New York International Auto Show", date: "Apr 3 - 12, 2026", month: 4, type: "Auto Show", isTop10: false, location: "New York, USA", price: "$22" },
                { title: "WRC Croatia Rally", date: "Apr 23 - 26, 2026", month: 4, type: "Motorsport", isTop10: false, location: "Zagreb, Croatia", price: "From €30" },
                { title: "Formula 1 Miami Grand Prix", date: "May 1 - 3, 2026", month: 5, type: "Motorsport", isTop10: true, location: "Miami, USA", price: "From $600" },
                { title: "Formula 1 Monaco Grand Prix", date: "May 21 - 24, 2026", month: 5, type: "Motorsport", isTop10: true, location: "Monte Carlo, Monaco", price: "From €150" },
                { title: "Indianapolis 500", date: "May 24, 2026", month: 5, type: "Motorsport", isTop10: true, location: "Indiana, USA", price: "From $65" },
                { title: "Nürburgring 24 Hours", date: "Jun 4 - 7, 2026", month: 6, type: "Motorsport", isTop10: false, location: "Nürburg, Germany", price: "From €35" },
                { title: "24 Hours of Le Mans", date: "Jun 13 - 14, 2026", month: 6, type: "Motorsport", isTop10: true, location: "Le Mans, France", price: "From €94" },
                { title: "Pikes Peak Hill Climb", date: "Jun 28, 2026", month: 6, type: "Motorsport", isTop10: false, location: "Colorado, USA", price: "From $75" },
                { title: "Goodwood Festival of Speed", date: "Jul 9 - 12, 2026", month: 7, type: "Festival", isTop10: true, location: "West Sussex, UK", price: "From £60" },
                { title: "WRC Rally Finland", date: "Jul 30 - Aug 2, 2026", month: 8, type: "Motorsport", isTop10: false, location: "Jyväskylä, Finland", price: "From €85" },
                { title: "Monterey Car Week", date: "Aug 14 - 23, 2026", month: 8, type: "Auto Show", isTop10: true, location: "California, USA", price: "Varies ($50 - $500+)" },
                { title: "IAA Mobility Munich", date: "Sep 8 - 13, 2026", month: 9, type: "Auto Show", isTop10: true, location: "Munich, Germany", price: "From €25" },
                { title: "Goodwood Revival", date: "Sep 11 - 13, 2026", month: 9, type: "Festival", isTop10: false, location: "West Sussex, UK", price: "From £75" },
                { title: "Paris Motor Show", date: "Oct 12 - 18, 2026", month: 10, type: "Auto Show", isTop10: false, location: "Paris, France", price: "From €16" },
                { title: "SEMA Show Las Vegas", date: "Nov 3 - 6, 2026", month: 11, type: "Auto Show", isTop10: true, location: "Nevada, USA", price: "Trade Only" },
                { title: "F1 Las Vegas Grand Prix", date: "Nov 19 - 21, 2026", month: 11, type: "Motorsport", isTop10: false, location: "Nevada, USA", price: "From $500" },
                { title: "F1 Abu Dhabi Finale", date: "Dec 4 - 6, 2026", month: 12, type: "Motorsport", isTop10: false, location: "Yas Island, UAE", price: "From AED 999" },
            ];

            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            
            const filteredEvents = filter === 'Top 10' 
                ? events.filter(e => e.isTop10).slice(0, 10)
                : events.filter(e => e.month === parseInt(filter)).sort((a,b) => a.month - b.month);

            return (
                <div className="py-12 border-t border-border mt-8">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                        <h3 className="font-display font-bold text-2xl flex items-center gap-3">
                            <span className="text-accent"><IconCalendar /></span> 2026 Events Calendar
                        </h3>
                        
                        <div className="flex overflow-x-auto gap-2 pb-2 md:pb-0 scrollbar-hide">
                            <button 
                                onClick={() => setFilter('Top 10')}
                                className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors ${filter === 'Top 10' ? 'bg-accent text-white' : 'bg-dark border border-border text-gray-400 hover:text-white'}`}
                            >
                                🏆 Top 10
                            </button>
                            {months.map((m, idx) => {
                                const monthNum = idx + 1;
                                const hasEvents = events.some(e => e.month === monthNum);
                                return (
                                    <button 
                                        key={m}
                                        onClick={() => setFilter(monthNum.toString())}
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors ${filter === monthNum.toString() ? 'bg-white text-dark' : 'bg-dark border border-border text-gray-400 hover:text-white'} ${!hasEvents ? 'opacity-30 cursor-not-allowed' : ''}`}
                                        disabled={!hasEvents}
                                    >
                                        {m}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {filteredEvents.length > 0 ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            {filteredEvents.map((evt, i) => (
                                <div key={i} className="bg-card border border-border rounded-2xl overflow-hidden group hover:border-accent transition-all shadow-sm flex flex-col relative h-full">
                                    <div className="h-16 bg-gradient-to-r from-dark to-card border-b border-border/50 relative overflow-hidden flex items-center px-5">
                                        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, white 1px, transparent 0)', backgroundSize: '16px 16px' }}></div>
                                        <span className="bg-dark/80 backdrop-blur-md text-[10px] font-bold tracking-widest uppercase text-white px-2.5 py-1 rounded border border-border/50 z-10">
                                            {evt.type}
                                        </span>
                                    </div>
                                    <div className="p-5 flex-1 flex flex-col">
                                        <h4 className="text-white font-bold text-lg mb-4 leading-tight">{evt.title}</h4>
                                        <div className="mt-auto space-y-3">
                                            <div className="flex items-start gap-2 text-xs text-gray-400">
                                                <span className="mt-0.5 text-gray-500"><IconLocation /></span>
                                                <span>{evt.location}</span>
                                            </div>
                                            <div className="flex items-start gap-2 text-xs text-gray-400">
                                                <span className="mt-0.5 text-gray-500"><IconCalendar /></span>
                                                <span className="text-accent font-medium">{evt.date}</span>
                                            </div>
                                            <div className="flex items-start gap-2 text-xs text-gray-400 pt-3 border-t border-border/50">
                                                <span className="mt-0.5 text-gray-500"><IconTicket /></span>
                                                <span className="text-gray-200 font-medium">Est. Price: {evt.price}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="text-center py-10 bg-card border border-border rounded-2xl">
                            <p className="text-gray-500">No major events found for this month.</p>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const loadData = () => { const saved = localStorage.getItem("carbio_data"); return saved ? JSON.parse(saved) : []; };
            const loadProfile = () => localStorage.getItem("carbio_profile") || "Driver";

            const [data, setData] = React.useState(loadData);
            const [profileName, setProfileName] = React.useState(loadProfile);
            
            const [selectedCar, setSelectedCar] = React.useState(null);
            const [editingCar, setEditingCar] = React.useState(null);
            
            const [shareOpen, setShareOpen] = React.useState(false);
            const [addModalOpen, setAddModalOpen] = React.useState(false);
            const [nameModalOpen, setNameModalOpen] = React.useState(false);
            const [voteModalOpen, setVoteModalOpen] = React.useState(false);
            const [aiAnalysisOpen, setAiAnalysisOpen] = React.useState(false);
            const [confirmModalConfig, setConfirmModalConfig] = React.useState({ isOpen: false, title: '', message: '', onConfirm: null, confirmText: '' });

            const [refreshCounter, setRefreshCounter] = React.useState(0);
            const [isFetchingDemo, setIsFetchingDemo] = React.useState(true);

            // --- 🚀 AUTO FETCH DEMO EXCEL ON MOUNT 🚀 ---
            React.useEffect(() => {
                const fetchDemoFile = async () => {
                    const filesToTry = ['./demo.xlsx', './demo.csv']; // Hem XLSX hem de CSV formatlarını dene
                    
                    for (const file of filesToTry) {
                        try {
                            const response = await fetch(file, { cache: 'no-store' });
                            if (response.ok) {
                                const arrayBuffer = await response.arrayBuffer();
                                const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                                const jd = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                                const validCars = jd.filter(r => r.Make);
                                
                                if (validCars.length > 0) {
                                    setData(validCars);
                                    setProfileName("Yigit"); // Defaulting name based on Excel
                                    setIsFetchingDemo(false);
                                    return; // Başarıyla yüklendiğinde alt taraftaki LocalStorage kontrolünü iptal et.
                                }
                            }
                        } catch (error) {
                            console.warn(`No local ${file} found or fetch failed. Checking local storage...`);
                        }
                    }
                    
                    // Sadece demo dosyaları bulunamazsa tarayıcı (local storage) verisini kullan.
                    const saved = localStorage.getItem("carbio_data");
                    if (saved) {
                        try {
                            const parsed = JSON.parse(saved);
                            if (parsed && parsed.length > 0) {
                                setData(parsed);
                            }
                        } catch(e) {}
                    }
                    setIsFetchingDemo(false);
                };

                fetchDemoFile();
            }, []);

            // --- MANUAL REFRESH BUTTON (Forces fetch from demo files) ---
            const triggerRefresh = async () => {
                setIsFetchingDemo(true);
                const filesToTry = ['./demo.xlsx', './demo.csv'];
                
                for (const file of filesToTry) {
                    try {
                        const response = await fetch(file, { cache: 'no-store' });
                        if (response.ok) {
                            const arrayBuffer = await response.arrayBuffer();
                            const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                            const jd = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                            const validCars = jd.filter(r => r.Make);
                            
                            if (validCars.length > 0) {
                                setData(validCars);
                                break;
                            }
                        }
                    } catch (error) {
                        console.warn(`Sync failed for ${file}.`);
                    }
                }
                setRefreshCounter(prev => prev + 1);
                setIsFetchingDemo(false);
            };

            React.useEffect(() => { localStorage.setItem("carbio_data", JSON.stringify(data)); }, [data]);
            React.useEffect(() => { localStorage.setItem("carbio_profile", profileName); }, [profileName]);

            const handleUpload = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                if (file.name.endsWith('json')) {
                    reader.onload = (evt) => { try { const jd = JSON.parse(evt.target.result); if(Array.isArray(jd)) setData(prev => [...jd, ...prev]); } catch(e){} };
                    reader.readAsText(file);
                } else {
                    reader.onload = (evt) => { const wb = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'}); const jd = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); setData(prev => [...jd.filter(r=>r.Make), ...prev]); };
                    reader.readAsArrayBuffer(file);
                }
                e.target.value = null;
            };

            const openConfirm = (title, message, confirmText, onConfirm) => {
                setConfirmModalConfig({ isOpen: true, title, message, confirmText, onConfirm });
            };
            const closeConfirm = () => setConfirmModalConfig(prev => ({ ...prev, isOpen: false }));

            const handleReset = () => openConfirm('Are you sure?', 'This will permanently delete all your car data.', 'Yes, Reset', () => { setData([]); closeConfirm(); });

            const totalDistance = data.reduce((s, c) => s + (Number(c['Mileage (est)']) || 0), 0);
            const totalCO2 = data.reduce((s, c) => s + calculateCO2(c), 0);
            const countries = new Set(data.map(c => c.Country).filter(Boolean));

            return (
                <div className="font-sans selection:bg-accent selection:text-white pb-20">
                    <NewsTicker refreshTrigger={refreshCounter} />
                    <HeroSection 
                        profileName={profileName} onEditProfile={() => setNameModalOpen(true)}
                        data={data} totalCars={data.length} totalDistance={totalDistance} totalCountries={countries.size} 
                        onUpload={handleUpload} onAdd={() => setAddModalOpen(true)}
                        onShare={() => setShareOpen(true)} onReset={handleReset}
                        onVoteClick={() => setVoteModalOpen(true)}
                        onRefreshClick={triggerRefresh} isRefreshing={isFetchingDemo}
                        onAnalyze={() => setAiAnalysisOpen(true)}
                        onExport={()=>{
                            const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
                            a.download = "Carbiography.json"; document.body.appendChild(a); a.click(); a.remove();
                        }}
                    />

                    <div className="max-w-7xl mx-auto px-4 sm:px-8 mt-8">
                        {isFetchingDemo ? (
                            <div className="py-24 text-center flex flex-col items-center">
                                <IconRefresh spinning={true} className="w-12 h-12 text-accent mb-4" />
                                <h2 className="text-2xl font-display font-bold text-white mb-2">Loading your garage...</h2>
                                <p className="text-gray-400">Fetching local data from the server</p>
                            </div>
                        ) : data.length > 0 ? (
                            <>
                                <DeepInsights data={data} totalCO2={totalCO2} totalDistance={totalDistance} />
                                <Timeline data={data} onCarClick={setSelectedCar} />
                                <CollectionGrid data={data} onCarClick={setSelectedCar} />
                            </>
                        ) : (
                            <div className="py-16 md:py-24 text-center flex flex-col items-center max-w-2xl mx-auto animate-fade-in">
                                <div className="w-20 h-20 bg-dark border border-border rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(225,29,72,0.2)]">
                                    <IconMagic />
                                </div>
                                <h2 className="text-3xl font-display font-bold text-white mb-4">Welcome to your Carbiography</h2>
                                <p className="text-gray-400 mb-8 leading-relaxed">
                                    If a <b>demo.xlsx</b> file is placed in your root directory, it will automatically load here.<br/>
                                    Otherwise, you can start building your automotive timeline manually.
                                </p>

                                <div className="bg-dark border border-border rounded-2xl p-6 mb-8 text-left w-full">
                                    <h3 className="text-accent font-bold uppercase tracking-widest text-xs mb-4">How to add a car?</h3>
                                    <ul className="space-y-4 text-sm text-gray-300">
                                        <li className="flex gap-3 items-start">
                                            <span className="w-6 h-6 rounded-full bg-card border border-border flex items-center justify-center shrink-0 font-bold text-white text-xs">1</span>
                                            <div>Click the <b>Add Car</b> button below.</div>
                                        </li>
                                        <li className="flex gap-3 items-start">
                                            <span className="w-6 h-6 rounded-full bg-card border border-border flex items-center justify-center shrink-0 font-bold text-white text-xs">2</span>
                                            <div>Enter the <b>Make</b> (e.g., BMW), <b>Model</b> (e.g., M3) and <b>Model Year</b> (e.g., 1990).</div>
                                        </li>
                                        <li className="flex gap-3 items-start">
                                            <span className="w-6 h-6 rounded-full bg-accent text-white flex items-center justify-center shrink-0 font-bold text-xs shadow-[0_0_10px_rgba(225,29,72,0.5)]">3</span>
                                            <div>Click <b>Fetch Specs</b>. We will automatically find the horsepower, engine, and drive type for you!</div>
                                        </li>
                                    </ul>
                                </div>

                                <button onClick={() => setAddModalOpen(true)} className="bg-accent hover:bg-accentHover text-white px-8 py-4 rounded-full font-bold transition flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(225,29,72,0.4)] w-full sm:w-auto">
                                    <IconPlus /> Add Your First Car
                                </button>
                            </div>
                        )}
                        
                        <UpcomingGames />
                        <EngineWars />
                        <EventsCalendar />
                    </div>

                    <DetailModal 
                        car={selectedCar} 
                        onClose={() => setSelectedCar(null)} 
                        onEdit={() => { setEditingCar(selectedCar); setSelectedCar(null); }}
                        onDelete={() => {
                            openConfirm('Delete Car?', `Are you sure you want to permanently delete the ${selectedCar?.Make} ${selectedCar?.Model}?`, 'Yes, Delete', () => {
                                setData(prev => prev.filter(c => c['#'] !== selectedCar['#']));
                                setSelectedCar(null);
                                closeConfirm();
                            });
                        }}
                    />
                    
                    <ShareModal data={data} totalDistance={totalDistance} totalCO2={totalCO2} open={shareOpen} onClose={() => setShareOpen(false)} profileName={profileName} />
                    
                    <AddCarModal 
                        isOpen={addModalOpen || !!editingCar} 
                        initialData={editingCar}
                        onClose={() => { setAddModalOpen(false); setEditingCar(null); }} 
                        onSave={car => {
                            if (editingCar) {
                                setData(prev => prev.map(c => c['#'] === car['#'] ? car : c));
                            } else {
                                setData(prev => [car, ...prev]);
                            }
                            setAddModalOpen(false);
                            setEditingCar(null);
                        }} 
                        existingData={data} 
                    />
                    
                    <DailyVoteModal isOpen={voteModalOpen} onClose={() => setVoteModalOpen(false)} />
                    
                    <PromptModal isOpen={nameModalOpen} title="Profile Name" desc="Enter a name to display on your dashboard and share cards." defaultValue={profileName} onClose={()=>setNameModalOpen(false)} onSave={setProfileName} />
                    
                    <ConfirmModal 
                        isOpen={confirmModalConfig.isOpen} 
                        title={confirmModalConfig.title} 
                        message={confirmModalConfig.message} 
                        confirmText={confirmModalConfig.confirmText} 
                        onClose={closeConfirm} 
                        onConfirm={confirmModalConfig.onConfirm} 
                    />

                    <AIGarageAnalysisModal 
                        isOpen={aiAnalysisOpen} 
                        onClose={() => setAiAnalysisOpen(false)} 
                        data={data} 
                    />

                    <footer className="max-w-7xl mx-auto px-4 sm:px-8 mt-16 pt-8 pb-12 border-t border-border text-center">
                        <p className="text-gray-500 text-sm font-medium">
                            Developed by <a href="https://www.linkedin.com/in/yigityuksel/" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-accent transition-colors underline decoration-border hover:decoration-accent underline-offset-4 font-bold">Yigit Yuksel</a>
                        </p>
                        <a href="mailto:carbiography@gmail.com" className="text-gray-400 hover:text-accent transition-colors text-xs mt-2 inline-block">carbiography@gmail.com</a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
