    <style>
        /* Theme Variables */
        :root {
            --bg-base: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #E11D48;
            --accent-hover: #BE123C;
        }
        .dark {
            --bg-base: #0F0F0F;
            --bg-card: #1A1A1A;
            --border: #2A2A2A;
            --text-main: #FFFFFF;
            --text-muted: #9CA3AF;
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { animation: marquee 35s linear infinite; }
        .animate-marquee:hover { animation-play-state: paused; }
        
        select { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Custom Scrollbar for Insights */
        .insight-scrollbar::-webkit-scrollbar { height: 6px; }
        .insight-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .insight-scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .insight-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>

        // --- MOCK API DATABASE FOR SMART AUTOFILL ---
        const localCarDB = [
            { Make: 'BMW', Model: '320i', Power: 170, Engine: 1.6, Fuel: 'Petrol', Transmission: 'Automatic', Drive: 'RWD', Segment: 'Luxury' },
            { Make: 'BMW', Model: 'M3', MinYear: 1986, MaxYear: 1991, Power: 200, Engine: 2.3, Fuel: 'Petrol', Transmission: 'Manual', Drive: 'RWD', Segment: 'Performance' },
            { Make: 'Audi', Model: 'A3', Power: 150, Engine: 1.4, Fuel: 'Petrol', Transmission: 'Automatic', Drive: 'FWD', Segment: 'Economy' },
            { Make: 'Mercedes', Model: 'C200', Power: 184, Engine: 1.5, Fuel: 'Hybrid', Transmission: 'Automatic', Drive: 'RWD', Segment: 'Luxury' },

        ];

        const carCultureDB = {
            'ferrari458': { games: ['Forza Horizon 5', 'Gran Turismo 7'], movies: ['Transformers'], production: 6000, rarity: 'Ultra Rare' },
            'porsche911': { games: ['NFS Unbound', 'Gran Turismo 7'], movies: ['Bad Boys'], production: 1100000, rarity: 'Rare' },
        };

        const getCarCultureData = (make, model, power, segment) => {
            const normalize = (str) => (str || '').toString().toLowerCase().replace(/[^a-z0-9]/g, '');
            const key = normalize(make) + normalize(model);
            let data = carCultureDB[key];

            if (!data) {
                let estProduction = 5000000;
                let rarity = 'Common';
                let games = [];
                let movies = [];
                const hp = Number(power) || 100;
                const seg = String(segment).toLowerCase();

                if (hp > 500 || seg.includes('performance') || seg.includes('supercar')) {
                    estProduction = Math.floor(Math.random() * 8000) + 2000; rarity = 'Ultra Rare'; games = ['Forza Horizon 5']; movies = ['Action Movie'];
                } else if (hp > 300 || seg.includes('luxury')) {
                    estProduction = Math.floor(Math.random() * 150000) + 50000; rarity = 'Rare'; games = ['Need for Speed']; movies = ['Chase Scene'];
                } else {
                    rarity = 'Common'; games = ['City Simulator']; movies = ['Background'];
                }
                data = { production: estProduction, rarity, games, movies };
            }

            return {
                ...data,
                percentile: ((data.production / 8000000000) * 100).toFixed(5),
                formattedProduction: data.production >= 1000000 ? (data.production / 1000000).toFixed(1) + 'M' : data.production.toLocaleString()
            };
        };

        const calculateCO2 = (car) => {
            const distance = Number(car['Mileage (est)']) || 0;
            const hp = Number(car.Power) || 100;
            const fuel = String(car.Fuel).toLowerCase();
            let gPerKm = 120 + (hp * 0.4); 
            if (fuel.includes('electric')) gPerKm = 0; else if (fuel.includes('hybrid')) gPerKm = 80 + (hp * 0.2); else if (fuel.includes('diesel')) gPerKm = 100 + (hp * 0.3);
            return (gPerKm * distance) / 1000;
        };

        const calculateCarValue = (car) => {
            let baseValue = 15000;
            const hp = Number(car.Power) || 100;
            const year = parseInt(car['Model Year'] || String(car['Driving Year']).split('-')[0]) || 2015;
            const age = Math.max(0, new Date().getFullYear() - year);
            const segment = String(car.Segment).toLowerCase();
            const make = String(car.Make).toLowerCase();

            // Güç katkısı
            baseValue += (hp * 120);

            // Segment çarpanı
            if(segment.includes('supercar')) baseValue *= 4.0;
            else if(segment.includes('performance')) baseValue *= 2.0;
            else if(segment.includes('luxury')) baseValue *= 1.8;
            else if(segment.includes('suv')) baseValue *= 1.2;

            // Premium marka değeri
            const premiumBrands = ['porsche', 'ferrari', 'aston martin', 'lamborghini', 'mclaren', 'rolls royce', 'bentley', 'maserati'];
            if(premiumBrands.includes(make)) baseValue *= 2.0;

            // Yaşlanma / Klasikleşme
            if (age > 20 && (segment.includes('performance') || premiumBrands.includes(make))) {
                baseValue *= (1 + (age - 20) * 0.05); // 20 yaşından sonra her yıl %5 değer kazanır (Klasik)
            } else {
                baseValue *= Math.pow(0.92, Math.min(age, 15)); // 15 yıla kadar her yıl %8 değer kaybeder
            }
            return Math.round(baseValue);
        };

        const formatValue = (val) => {
            if(val >= 1000000) return '$' + (val / 1000000).toFixed(2) + 'M';
            if(val >= 1000) return '$' + (val / 1000).toFixed(0) + 'K';
            return '$' + val;
        };

        const calculateScore = (data) => {
            if(!data || data.length === 0) return 0;
            const cars = data.length;
            const countries = new Set(data.map(c=>c.Country).filter(Boolean)).size;
            const totalHp = data.reduce((s,c)=>s+(Number(c.Power)||0),0);
            const totalDist = data.reduce((s,c)=>s+(Number(c['Mileage (est)'])||0),0);
            return Math.min(Math.round((cars * 1.5) + (countries * 3) + (totalHp / 200) + (totalDist / 5000)), 99);
        };

        const getBadges = (data) => {
            let badges = [];
            if(data.some(c => Number(c.Power) >= 400)) badges.push({icon: '🏎️', title: 'Supercar Driver'});
            if(data.some(c => String(c.Fuel).toLowerCase() === 'electric')) badges.push({icon: '⚡', title: 'Electric Pioneer'});
            if(data.some(c => Number(c.Cylinders) === 12 || String(c.Name).includes('V12') || Number(c.Power) > 500)) badges.push({icon: '👑', title: 'V12 Club'});
            if(new Set(data.map(c=>c.Country).filter(Boolean)).size >= 5) badges.push({icon: '🌍', title: 'Global Explorer'});
            if(data.reduce((s,c)=>s+(Number(c['Mileage (est)'])||0),0) > 100000) badges.push({icon: '🛣️', title: '100k Club'});
            return badges;
        };

        const baseCountryData = { 'Turkey': { flag: '🇹🇷' }, 'Sweden': { flag: '🇸🇪' }, 'Germany': { flag: '🇩🇪' }, 'UK': { flag: '🇬🇧' }, 'Italy': { flag: '🇮🇹' }, 'Norway': { flag: '🇳🇴' }, 'USA': { flag: '🇺🇸' }, 'France': { flag: '🇫🇷' }, 'Japan': { flag: '🇯🇵' }, 'Spain': { flag: '🇪🇸' }, 'Scotland': { flag: '🏴󠁧󠁢󠁳󠁣󠁴󠁿' } };

        const getSegmentStyle = (seg) => {
            const s = String(seg).toLowerCase();

        };

        // --- COMPONENTS ---

        const NewsTicker = React.memo(({ refreshTrigger }) => {
            const [newsItems, setNewsItems] = React.useState([]);
            const allNewsPool = [
                "📰 F1 2026 Season kicks off in Bahrain with the new engine regulations shaking up the grid.",

                { title: "Indianapolis 500", date: "May 24, 2026", month: 5, type: "Motorsport", isTop10: true, location: "Indiana, USA", price: "From $65" },
                { title: "Nürburgring 24 Hours", date: "Jun 4 - 7, 2026", month: 6, type: "Motorsport", isTop10: false, location: "Nürburg, Germany", price: "From €35" },
                { title: "24 Hours of Le Mans", date: "Jun 13 - 14, 2026", month: 6, type: "Motorsport", isTop10: true, location: "Le Mans, France", price: "From €94" },
                { title: "Pikes Peak Hill Climb", date: "Jun 28, 2026", month: 6, type: "Motorsport", isTop10: false, location: "Colorado, USA", price: "From $75" },
                { title: "Goodwood Festival of Speed", date: "Jul 9 - 12, 2026", month: 7, type: "Festival", isTop10: true, location: "West Sussex, UK", price: "From £60" },
                { title: "WRC Rally Finland", date: "Jul 30 - Aug 2, 2026", month: 8, type: "Motorsport", isTop10: false, location: "Jyväskylä, Finland", price: "From €85" },
                { title: "Monterey Car Week", date: "Aug 14 - 23, 2026", month: 8, type: "Auto Show", isTop10: true, location: "California, USA", price: "Varies ($50 - $500+)" },
                { title: "IAA Mobility Munich", date: "Sep 8 - 13, 2026", month: 9, type: "Auto Show", isTop10: true, location: "Munich, Germany", price: "From €25" },
                { title: "Goodwood Revival", date: "Sep 11 - 13, 2026", month: 9, type: "Festival", isTop10: false, location: "West Sussex, UK", price: "From £75" },
                { title: "Paris Motor Show", date: "Oct 12 - 18, 2026", month: 10, type: "Auto Show", isTop10: false, location: "Paris, France", price: "From €16" },
                { title: "SEMA Show Las Vegas", date: "Nov 3 - 6, 2026", month: 11, type: "Auto Show", isTop10: true, location: "Nevada, USA", price: "Trade Only" },
                { title: "F1 Las Vegas Grand Prix", date: "Nov 19 - 21, 2026", month: 11, type: "Motorsport", isTop10: false, location: "Nevada, USA", price: "From $500" },
                { title: "F1 Abu Dhabi Finale", date: "Dec 4 - 6, 2026", month: 12, type: "Motorsport", isTop10: false, location: "Yas Island, UAE", price: "From AED 999" },
            ];

            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            
            const filteredEvents = filter === 'Top 10' 
                ? events.filter(e => e.isTop10).slice(0, 10)
                : events.filter(e => e.month === parseInt(filter)).sort((a,b) => a.month - b.month);

            return (
                <div className="py-12 border-t border-border mt-8">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                        <h3 className="font-display font-bold text-2xl flex items-center gap-3 text-textMain">
                            <span className="text-accent"><IconCalendar /></span> 2026 Events Calendar
                        </h3>
                        
                        <div className="flex overflow-x-auto gap-2 pb-2 md:pb-0 scrollbar-hide">
                            <button 
                                onClick={() => setFilter('Top 10')}
                                className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors ${filter === 'Top 10' ? 'bg-accent text-[#fff]' : 'bg-dark border border-border text-textMuted hover:text-textMain'}`}
                            >
                                🏆 Top 10
                            </button>
                            {months.map((m, idx) => {
                                const monthNum = idx + 1;
                                const hasEvents = events.some(e => e.month === monthNum);
                                return (
                                    <button 
                                        key={m}
                                        onClick={() => setFilter(monthNum.toString())}
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors ${filter === monthNum.toString() ? 'bg-textMain text-dark' : 'bg-dark border border-border text-textMuted hover:text-textMain'} ${!hasEvents ? 'opacity-30 cursor-not-allowed' : ''}`}
                                        disabled={!hasEvents}
                                    >
                                        {m}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {filteredEvents.length > 0 ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            {filteredEvents.map((evt, i) => (
                                <div key={i} className="bg-card border border-border rounded-2xl overflow-hidden group hover:border-accent transition-all shadow-sm flex flex-col relative h-full">
                                    <div className="h-12 bg-gradient-to-r from-dark to-card border-b border-border/50 relative overflow-hidden flex items-center px-4">
                                        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, var(--border) 1px, transparent 0)', backgroundSize: '16px 16px' }}></div>
                                        <span className="bg-dark/80 backdrop-blur-md text-[9px] font-bold tracking-widest uppercase text-textMain px-2 py-0.5 rounded border border-border/50 z-10">
                                            {evt.type}
                                        </span>
                                    </div>
                                    <div className="p-4 flex-1 flex flex-col">
                                        <h4 className="text-textMain font-bold text-base mb-3 leading-tight">{evt.title}</h4>
                                        <div className="mt-auto space-y-2">
                                            <div className="flex items-start gap-2 text-xs text-textMuted">
                                                <span className="mt-0.5"><IconLocation /></span>
                                                <span>{evt.location}</span>
                                            </div>
                                            <div className="flex items-start gap-2 text-xs text-textMuted">
                                                <span className="mt-0.5"><IconCalendar /></span>
                                                <span className="text-accent font-medium">{evt.date}</span>
                                            </div>
                                            <div className="flex items-start gap-2 text-xs text-textMuted pt-2 border-t border-border/50">
                                                <span className="mt-0.5"><IconTicket /></span>
                                                <span className="text-textMain font-medium">Est. Price: {evt.price}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="text-center py-10 bg-card border border-border rounded-2xl">
                            <p className="text-textMuted">No major events found for this month.</p>
                        </div>
                    )}
                </div>
            );
        });

        // ------------------ APP ------------------
        const App = () => {
            const loadData = () => { const saved = localStorage.getItem("carbio_data"); return saved ? JSON.parse(saved) : []; };
            const loadProfile = () => localStorage.getItem("carbio_profile") || "Driver";

            const [data, setData] = React.useState(loadData);
            const [profileName, setProfileName] = React.useState(loadProfile);
            
            const [selectedCar, setSelectedCar] = React.useState(null);
            const [editingCar, setEditingCar] = React.useState(null);
            
            const [shareOpen, setShareOpen] = React.useState(false);
            const [addModalOpen, setAddModalOpen] = React.useState(false);
            const [nameModalOpen, setNameModalOpen] = React.useState(false);
            const [voteModalOpen, setVoteModalOpen] = React.useState(false);
            const [confirmModalConfig, setConfirmModalConfig] = React.useState({ isOpen: false, title: '', message: '', onConfirm: null, confirmText: '' });

            const [refreshCounter, setRefreshCounter] = React.useState(0);
            const [isFetchingDemo, setIsFetchingDemo] = React.useState(false);

            // THEME STATE
            const [theme, setTheme] = React.useState(localStorage.getItem('theme') || 'dark');
            
            // FIREBASE USER STATE (VOTING IÇIN)
            const [user, setUser] = React.useState(null);

            React.useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    document.documentElement.classList.remove('light');
                } else {
                    document.documentElement.classList.add('light');
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            const toggleTheme = React.useCallback(() => setTheme(t => t === 'dark' ? 'light' : 'dark'), []);

            React.useEffect(() => { localStorage.setItem("carbio_data", JSON.stringify(data)); }, [data]);
            React.useEffect(() => { localStorage.setItem("carbio_profile", profileName); }, [profileName]);

            // FIREBASE AUTH (VOTING IÇIN GEREKLI)
            React.useEffect(() => {
                const initAuth = async () => {
                    if (!isFirebaseEnabled || !auth) return;
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) { console.error("Firebase Auth Hatası:", error); }
                };
                initAuth();
                if (isFirebaseEnabled && auth) {
                    const unsubscribe = onAuthStateChanged(auth, (currentUser) => setUser(currentUser));
                    return () => unsubscribe();
                }
            }, []);

            const loadDemoData = async () => {
                setIsFetchingDemo(true);
                // Harici dosyaya olan bağımlılığı kırıp sağlam bir demo verisi gömüyoruz
                const demoCars = [
                    { Make: "Porsche", Model: "911 Carrera S", "Model Year": "2021", "Driving Year": "2023", Power: 443, Engine: 3.0, Fuel: "Petrol", Transmission: "Automatic", Drive: "RWD", Segment: "Performance", "Mileage (est)": 1500, Country: "Germany", Points: 9, Status: "Test", Story: "Incredible balance and iconic sound on the Autobahn.", "#": Date.now() + 1 },
                    { Make: "Tesla", Model: "Model 3 Performance", "Model Year": "2022", "Driving Year": "2022", Power: 450, Engine: 0, Fuel: "Electric", Transmission: "Automatic", Drive: "AWD", Segment: "Luxury", "Mileage (est)": 12000, Country: "Norway", Points: 8, Status: "Owned", Story: "Instant torque changes how you perceive acceleration.", "#": Date.now() + 2 },
                    { Make: "Toyota", Model: "Land Cruiser", "Model Year": "2018", "Driving Year": "2019", Power: 275, Engine: 4.0, Fuel: "Petrol", Transmission: "Automatic", Drive: "AWD", Segment: "SUV", "Mileage (est)": 5000, Country: "Turkey", Points: 7, Status: "Rental", Story: "Indestructible. Handled off-road trails effortlessly.", "#": Date.now() + 3 },
                    { Make: "Ferrari", Model: "458 Italia", "Model Year": "2014", "Driving Year": "2024", Power: 562, Engine: 4.5, Fuel: "Petrol", Transmission: "Automatic", Drive: "RWD", Segment: "Supercar", "Mileage (est)": 300, Country: "Italy", Points: 10, Status: "Rental", Story: "The last naturally aspirated V8. Pure emotion.", "#": Date.now() + 4 },
                    { Make: "Volvo", Model: "XC40 Recharge", "Model Year": "2023", "Driving Year": "2024", Power: 402, Engine: 0, Fuel: "Electric", Transmission: "Automatic", Drive: "AWD", Segment: "SUV", "Mileage (est)": 8500, Country: "Sweden", Points: 8, Status: "Leasing", Story: "Silent, powerful, and remarkably practical daily driver.", "#": Date.now() + 5 },
                    { Make: "Ford", Model: "Mustang GT", "Model Year": "2019", "Driving Year": "2020", Power: 460, Engine: 5.0, Fuel: "Petrol", Transmission: "Manual", Drive: "RWD", Segment: "Performance", "Mileage (est)": 2000, Country: "USA", Points: 8, Status: "Rental", Story: "Classic American V8 muscle on Route 66.", "#": Date.now() + 6 }
                ];
                
                // Demo yükleme hissiyatı için minik bir animasyon süresi
                await new Promise(r => setTimeout(r, 600));
                
                setData(demoCars); 
                setProfileName("Demo User"); 
                setIsFetchingDemo(false);
            };

            const triggerRefresh = React.useCallback(async () => { setRefreshCounter(prev => prev + 1); }, []);

            const handleUpload = React.useCallback((e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                if (file.name.endsWith('json')) {
                    reader.onload = (evt) => { try { const jd = JSON.parse(evt.target.result); if(Array.isArray(jd)) setData(prev => [...jd, ...prev]); } catch(e){} };
                    reader.readAsText(file);
                } else {
                    reader.onload = (evt) => { const wb = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'}); const jd = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); setData(prev => [...jd.filter(r=>r.Make), ...prev]); };
                    reader.readAsArrayBuffer(file);
                }
                e.target.value = null;
            }, []);

            const openConfirm = (title, message, confirmText, onConfirm) => setConfirmModalConfig({ isOpen: true, title, message, confirmText, onConfirm });
            const closeConfirm = () => setConfirmModalConfig(prev => ({ ...prev, isOpen: false }));
            const handleReset = () => openConfirm('Are you sure?', 'This will permanently delete all your local car data.', 'Yes, Reset', () => { setData([]); closeConfirm(); });

            // MEMOIZED DERIVED STATES
            const totalDistance = React.useMemo(() => data.reduce((s, c) => s + (Number(c['Mileage (est)']) || 0), 0), [data]);
            const totalCO2 = React.useMemo(() => data.reduce((s, c) => s + calculateCO2(c), 0), [data]);
            const totalValue = React.useMemo(() => data.reduce((s, c) => s + calculateCarValue(c), 0), [data]);

            return (
                <div className="font-sans selection:bg-accent selection:text-[#fff] pb-20">
                    <NewsTicker refreshTrigger={refreshCounter} />
                    
                    <HeroSection 
                        profileName={profileName} onEditProfile={() => setNameModalOpen(true)}
                        data={data} totalCars={data.length}
                        onUpload={handleUpload} onAdd={() => setAddModalOpen(true)}
                        onShare={() => setShareOpen(true)} onReset={handleReset}
                        onVoteClick={() => setVoteModalOpen(true)}
                        onRefreshClick={triggerRefresh} isRefreshing={isFetchingDemo}
                        theme={theme} toggleTheme={toggleTheme}
                    />

                    <div className="max-w-[1400px] mx-auto px-4 sm:px-8 mt-8 flex flex-col lg:flex-row gap-8 items-start">
                        
                        {data.length > 0 && (
                            <div className="w-full lg:w-1/4 shrink-0 lg:sticky lg:top-8 max-h-[calc(100vh-4rem)] overflow-y-auto scrollbar-hide">
                                <Timeline data={data} onCarClick={setSelectedCar} />
                            </div>
                        )}

                        <div className={`w-full ${data.length > 0 ? 'lg:w-3/4' : ''} flex flex-col gap-8`}>
                            {data.length > 0 ? (
                                <>
                                    <DeepInsights data={data} totalCO2={totalCO2} totalDistance={totalDistance} totalValue={totalValue} />
                                    <CollectionGrid data={data} onCarClick={setSelectedCar} />
                                    <UpcomingGames />
                                    <EngineWars />
                                    <EventsCalendar />
                                </>
                            ) : (
                                <div className="py-12 md:py-20 flex flex-col items-center max-w-7xl mx-auto animate-fade-in w-full">
                                    <div className="text-center max-w-3xl mx-auto mb-16 px-4">
                                        <div className="w-20 h-20 bg-dark border border-border rounded-full flex items-center justify-center mb-6 shadow-md text-textMain mx-auto">
                                            <IconMagic />
                                        </div>
                                        <h2 className="text-4xl md:text-5xl font-display font-bold text-textMain mb-6 tracking-tight">
                                            Welcome to your Carbiography
                                        </h2>
                                        <p className="text-lg text-textMuted mb-10 leading-relaxed max-w-2xl mx-auto">
                                            Start building your automotive timeline manually, or if you want to see how the dashboard looks fully populated, you can load the demo portfolio.
                                        </p>

                                        <div className="flex flex-col sm:flex-row gap-4 justify-center w-full max-w-lg mx-auto">
                                            <button onClick={() => setAddModalOpen(true)} className="bg-accent hover:bg-accentHover text-[#fff] px-8 py-4 rounded-full font-bold transition flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(225,29,72,0.4)] w-full">
                                                <IconPlus /> Add Your First Car
                                            </button>
                                            <button onClick={loadDemoData} disabled={isFetchingDemo} className="bg-dark border border-border hover:bg-border text-textMain px-8 py-4 rounded-full font-bold transition flex items-center justify-center gap-3 w-full shadow-md">
                                                {isFetchingDemo ? <IconRefresh spinning={true} /> : "🏁 Try Demo Portfolio"}
                                            </button>
                                        </div>
                                    </div>

                                    <div className="w-full border-t border-border pt-16 md:pt-24 px-4">
                                        <div className="text-center mb-16">
                                            <h3 className="text-3xl md:text-4xl font-display font-bold text-textMain mb-4">Everything You Need to Track Your Journey</h3>
                                            <p className="text-lg text-textMuted max-w-2xl mx-auto">Carbiography acts as your personal digital garage log, computing your lifetime driving stats and turning them into a beautiful, shareable dashboard.</p>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 text-left max-w-6xl mx-auto">
                                            <div className="bg-card border border-border p-8 rounded-3xl shadow-sm hover:border-textMuted/30 transition-colors">
                                                <div className="w-12 h-12 rounded-xl bg-dark border border-border text-textMain flex items-center justify-center mb-6"><IconTrending /></div>
                                                <h4 className="font-bold text-xl text-textMain mb-3">Deep Insights Dashboard</h4>
                                                <p className="text-textMuted leading-relaxed">Automatically calculates your Driver Score, total mileage, carbon debt (CO2), global footprint, and brand loyalty.</p>
                                            </div>
                                            <div className="bg-card border border-border p-8 rounded-3xl shadow-sm hover:border-textMuted/30 transition-colors">
                                                <div className="w-12 h-12 rounded-xl bg-dark border border-border text-textMain flex items-center justify-center mb-6"><IconGlobe /></div>
                                                <h4 className="font-bold text-xl text-textMain mb-3">Smart Image Integration</h4>
                                                <p className="text-textMuted leading-relaxed">Simply enter Make, Model, and Year. Carbiography automatically retrieves high-quality images from Wikipedia to populate your garage.</p>
                                            </div>
                                            <div className="bg-card border border-border p-8 rounded-3xl shadow-sm hover:border-textMuted/30 transition-colors">
                                                <div className="w-12 h-12 rounded-xl bg-dark border border-border text-textMain flex items-center justify-center mb-6"><IconMagic /></div>
                                                <h4 className="font-bold text-xl text-textMain mb-3">AI Magazine Stories</h4>
                                                <p className="text-textMuted leading-relaxed">Powered by Google Gemini AI. Generate a dramatic Top Gear-style magazine review blending real-world car prestige with your personal memories.</p>
                                            </div>
                                            <div className="bg-card border border-border p-8 rounded-3xl shadow-sm hover:border-textMuted/30 transition-colors">
                                                <div className="w-12 h-12 rounded-xl bg-dark border border-border text-textMain flex items-center justify-center mb-6"><IconGamepad /></div>
                                                <h4 className="font-bold text-xl text-textMain mb-3">Pop Culture Intelligence</h4>
                                                <p className="text-textMuted leading-relaxed">Your garage becomes part of pop culture. Reveal global rarity, movie appearances, and presence in video games like Forza.</p>
                                            </div>
                                            <div className="bg-card border border-border p-8 rounded-3xl shadow-sm hover:border-textMuted/30 transition-colors">
                                                <div className="w-12 h-12 rounded-xl bg-dark border border-border text-textMain flex items-center justify-center mb-6"><IconCalendar /></div>
                                                <h4 className="font-bold text-xl text-textMain mb-3">Driving Timeline & Grid</h4>
                                                <p className="text-textMuted leading-relaxed">Visualize your history in a dynamic timeline based on the year you drove them, or filter your garage by Brand, Segment, or Fuel Type.</p>
                                            </div>
                                            <div className="bg-card border border-border p-8 rounded-3xl shadow-sm hover:border-textMuted/30 transition-colors">
                                                <div className="w-12 h-12 rounded-xl bg-dark border border-border text-textMain flex items-center justify-center mb-6"><IconShare /></div>
                                                <h4 className="font-bold text-xl text-textMain mb-3">Shareable Social Cards</h4>
                                                <p className="text-textMuted leading-relaxed">Export a stunning summary card including your Driver Score and Environmental Footprint. Perfect for sharing on LinkedIn or Instagram.</p>
                                            </div>
                                        </div>

                                        <div className="mt-20 text-center pb-10">
                                            <a href="https://github.com/yukselono/carbiography" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-3 px-8 py-4 bg-textMain text-dark rounded-full hover:opacity-90 transition-all font-bold shadow-lg">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                                View Open Source Repository
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <DetailModal 
                        car={selectedCar} 
                        onClose={() => setSelectedCar(null)} 
                        onEdit={() => { setEditingCar(selectedCar); setSelectedCar(null); }}
                        onDelete={() => {
                            openConfirm('Delete Car?', `Are you sure you want to permanently delete the ${selectedCar?.Make} ${selectedCar?.Model}?`, 'Yes, Delete', () => {
                                setData(prev => prev.filter(c => c['#'] !== selectedCar['#']));
                                setSelectedCar(null);
                                closeConfirm();
                            });
                        }}
                    />
                    
                    <ShareModal data={data} totalDistance={totalDistance} totalCO2={totalCO2} open={shareOpen} onClose={() => setShareOpen(false)} profileName={profileName} />
                    
                    <AddCarModal 
                        isOpen={addModalOpen || !!editingCar} 
                        initialData={editingCar}
                        onClose={() => { setAddModalOpen(false); setEditingCar(null); }} 
                        onSave={car => {
                            if (editingCar) setData(prev => prev.map(c => c['#'] === car['#'] ? car : c));
                            else setData(prev => [car, ...prev]);
                            setAddModalOpen(false); setEditingCar(null);
                        }} 
                        existingData={data} 
                    />
                    
                    <PromptModal isOpen={nameModalOpen} title="Profile Name" desc="Enter a name to display on your dashboard and share cards." defaultValue={profileName} onClose={()=>setNameModalOpen(false)} onSave={setProfileName} />
                    
                    <ConfirmModal 
                        isOpen={confirmModalConfig.isOpen} 
                        title={confirmModalConfig.title} message={confirmModalConfig.message} confirmText={confirmModalConfig.confirmText} 
                        onClose={closeConfirm} onConfirm={confirmModalConfig.onConfirm} 
                    />

                    <DailyVoteModal isOpen={voteModalOpen} onClose={() => setVoteModalOpen(false)} user={user} />

                    <footer className="max-w-[1400px] mx-auto px-4 sm:px-8 mt-16 pt-8 pb-12 border-t border-border text-center">
                        <p className="text-textMuted text-sm font-medium">
                            Developed by <a href="https://www.linkedin.com/in/yigityuksel/" target="_blank" rel="noopener noreferrer" className="text-textMain hover:text-accent transition-colors underline decoration-border hover:decoration-accent underline-offset-4 font-bold">Yigit Yuksel</a>
                        </p>
                        <a href="mailto:yuksel.ono@gmail.com" className="text-textMuted hover:text-accent transition-colors text-xs mt-2 inline-block">yuksel.ono@gmail.com</a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
